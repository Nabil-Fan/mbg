<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown · 20th Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #fdecea 0%, #fdf6f0 40%, #fce8d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* decorative grain / noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      z-index: 0;
    }

    /* main card container */
    .countdown-wrapper {
      position: relative;
      z-index: 2;
      max-width: 780px;
      width: 100%;
      background: rgba(255, 248, 240, 0.82);
      backdrop-filter: blur(3px);
      border-radius: 64px 48px 80px 48px;
      box-shadow: 0 30px 45px -20px rgba(90, 45, 45, 0.35), inset 0 1px 2px rgba(255,255,240,0.7);
      padding: 2rem 1.8rem 2.5rem 1.8rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(232, 160, 160, 0.25);
    }

    @media (min-width: 520px) {
      .countdown-wrapper {
        padding: 2.8rem 2.5rem 3.2rem 2.5rem;
      }
    }

    /* floral ornament */
    .floral-motif {
      text-align: center;
      font-size: 1.7rem;
      letter-spacing: 0.3rem;
      opacity: 0.7;
      margin-bottom: 0.5rem;
      color: #c28a6b;
    }

    .greeting {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: #7a3f3f;
      text-align: center;
      font-weight: 600;
      margin-top: 0.2rem;
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }

    .greeting span {
      color: #c58a6a;
      background: linear-gradient(135deg, #e8a0a0, #b56f4a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .age-badge {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aa7a6a;
      background: rgba(232, 160, 160, 0.15);
      display: inline-block;
      width: auto;
      margin: 0 auto 0.8rem;
      padding: 0.25rem 1rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    .sub {
      text-align: center;
      font-size: 0.85rem;
      color: #a07565;
      font-style: italic;
      margin-bottom: 1.6rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
    }

    /* countdown grid */
    .countdown-nums {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.2rem 0 1.6rem;
    }

    .cd-box {
      background: rgba(255, 245, 235, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 0.8rem 1rem;
      min-width: 85px;
      text-align: center;
      box-shadow: 0 8px 18px rgba(90, 45, 30, 0.08);
      border: 1px solid rgba(232, 160, 160, 0.4);
      transition: transform 0.2s ease;
    }
    
    .cd-box:hover {
      transform: translateY(-4px);
      background: rgba(255, 250, 240, 0.9);
    }

    .cd-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 3.7rem);
      font-weight: 500;
      color: #8b4e3c;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .cd-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b4846c;
      font-weight: 500;
      margin-top: 0.3rem;
    }

    .birthday-message {
      font-family: 'Dancing Script', cursive;
      font-size: 1.7rem;
      text-align: center;
      color: #b45a4a;
      margin-top: 1rem;
      background: rgba(253, 236, 234, 0.6);
      border-radius: 100px;
      padding: 0.6rem 1rem;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
    }

    .countdown-status {
      text-align: center;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: #906a5a;
      background: rgba(247, 214, 214, 0.4);
      border-radius: 60px;
      padding: 0.5rem 1rem;
      margin-top: 1.2rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .flower-divider {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 1rem 0 0.5rem;
      font-size: 0.9rem;
      color: #dba585;
    }

    /* decorative circles background */
    .bg-circles {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-circles div {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,160,160,0.12) 0%, transparent 70%);
    }
    .circle1 { width: 320px; height: 320px; top: -100px; left: -90px; }
    .circle2 { width: 280px; height: 280px; bottom: -80px; right: -70px; background: radial-gradient(circle, rgba(201,150,90,0.1) 0%, transparent 70%);}
    .circle3 { width: 160px; height: 160px; top: 25%; right: 5%; background: radial-gradient(circle, rgba(247,214,214,0.3) 0%, transparent 70%);}

    /* petal floating (soft) */
    .floating-petal {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      z-index: 1;
      animation: floatPetals linear infinite;
      opacity: 0.5;
    }
    @keyframes floatPetals {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* confetti canvas (light) */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* responsiveness */
    @media (max-width: 480px) {
      .cd-box {
        min-width: 68px;
        padding: 0.6rem 0.4rem;
      }
      .countdown-wrapper {
        padding: 1.6rem 1.2rem 2rem;
      }
      .greeting {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<div class="bg-circles">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<main class="countdown-wrapper">
  <div class="floral-motif">✧ ˚₊‧⁺˖ ♡ ˖⁺‧₊˚ ✧</div>

  <!-- COUNTDOWN DISPLAY AREA (dinamis) -->
  <div id="countdownCore" style="margin-top: 0.6rem;"></div>
  
  <div class="flower-divider">
    <span>🌷</span> <span>🌸</span> <span>🌼</span> <span>🌺</span> <span>🌸</span>
  </div>
  <div class="countdown-status" id="extraStatus">
    🌸 menanti momen spesial seseorang yang sangat berharga dihidupku 🌸
  </div>
</main>

<script>
  // ============================================================
  // ✨ CONFIGURASI ULANG TAHUN ✨
  // GANTI TANGGAL LAHIR sesuai keinginan (tahun, bulan, tanggal)
  // contoh: 2006 April 15  →  new Date(2006, 3, 15)   (bulan dimulai dari 0)
  // ============================================================
  const BIRTHDAY_DATE = new Date(2006, 3, 15);  // <--- Ubah di sini (tahun, bulan-1, tanggal)
  // Contoh lain: 2005 Desember 24 => new Date(2005, 11, 24)
  
  // Optional: waktu tepat (bisa tetap tengah malam)
  // Untuk akurasi, kita set jam 00:00:00 waktu lokal
  BIRTHDAY_DATE.setHours(0, 0, 0, 0);
  
  // ========== TIDAK PERLU DIUBAH DI BAWAH INI ==========
  const countdownContainer = document.getElementById("countdownCore");
  const extraStatusSpan = document.getElementById("extraStatus");
  
  let confettiLaunchedToday = false;
  let confettiAnimationActive = false;
  let pieces = [];
  let canvas = document.getElementById("confetti-canvas");
  let ctx = canvas.getContext("2d");
  
  // resize canvas
  function resizeCanvas() {
    if (canvas) {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  }
  window.addEventListener("resize", () => {
    resizeCanvas();
    if (confettiAnimationActive && pieces.length) drawConfettiFrame();
  });
  
  // confetti system sederhana
  function launchSoftConfetti() {
    if (!ctx) return;
    if (confettiAnimationActive && pieces.length > 30) return; // biar tidak terlalu spam
    const colors = ["#e8a0a0", "#f5c2b0", "#c9965a", "#f0d5a8", "#e3b28b", "#d9a07e", "#f7d6d6"];
    const newPieces = [];
    for (let i = 0; i < 70; i++) {
      newPieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 180,
        w: 5 + Math.random() * 8,
        h: 3 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: -1.2 + Math.random() * 2.5,
        vy: 2 + Math.random() * 4,
        angle: Math.random() * Math.PI * 2,
        spin: (0.02 + Math.random() * 0.08) * (Math.random() < 0.5 ? 1 : -1),
        life: 1,
      });
    }
    pieces = pieces.concat(newPieces);
    if (!confettiAnimationActive) {
      confettiAnimationActive = true;
      animateConfetti();
    }
  }
  
  function animateConfetti() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.life > 0);
    for (let p of pieces) {
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.life -= 0.006;
      ctx.save();
      ctx.globalAlpha = Math.min(p.life, 0.9);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (pieces.length > 0) {
      requestAnimationFrame(animateConfetti);
    } else {
      confettiAnimationActive = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  
  // fungsi utama countdown dan tampilan
  function updateCountdown() {
    const now = new Date();
    const currentYear = now.getFullYear();
    const birthMonth = BIRTHDAY_DATE.getMonth();
    const birthDay = BIRTHDAY_DATE.getDate();
    
    // menentukan ulang tahun tahun ini / tahun depan
    let thisYearBirthday = new Date(currentYear, birthMonth, birthDay);
    thisYearBirthday.setHours(0, 0, 0, 0);
    
    let targetDate;
    let isBirthdayToday = false;
    
    // cek apakah hari ini adalah ulang tahun
    if (now.getMonth() === birthMonth && now.getDate() === birthDay) {
      isBirthdayToday = true;
      targetDate = thisYearBirthday; // untuk perhitungan sisa (0 detik)
    } else {
      if (thisYearBirthday < now) {
        // jika tahun ini sudah lewat, pakai tahun depan
        targetDate = new Date(currentYear + 1, birthMonth, birthDay);
        targetDate.setHours(0, 0, 0, 0);
      } else {
        targetDate = thisYearBirthday;
      }
    }
    
    const diffMs = targetDate - now;
    const isToday = isBirthdayToday;
    
    // Jika hari ini ulang tahun
    if (isToday) {
      // tampilan spesial ulang tahun
      countdownContainer.innerHTML = `
        <div style="text-align: center;">
          <div class="birthday-message" style="font-size: clamp(1.8rem, 6vw, 2.6rem); margin-bottom: 0.4rem;">
            🎂  Selamat Ulang Tahun ke-20!  🎂
          </div>
          <div class="cd-box" style="background: #fff0e6; margin-top: 0.8rem; border: 1px solid #e8a0a0;">
            <div class="cd-num" style="color:#b4523c;">✨🌸✨</div>
            <div class="cd-label">HARI INI ISTIMEWA</div>
          </div>
          <div style="font-family: 'Dancing Script', cursive; margin-top: 1rem; font-size: 1.2rem; color: #b55a44;">
            dua puluh tahun penuh cinta & keindahan 💛
          </div>
        </div>
      `;
      extraStatusSpan.innerHTML = "🎉💖 Kamu 20 tahun hari ini! Selamat merayakan, Sayang! 💖🎉";
      
      // Launch confetti jika belum pernah diluncurkan hari ini
      if (!confettiLaunchedToday) {
        confettiLaunchedToday = true;
        resizeCanvas();
        launchSoftConfetti();
        // efek tambahan setiap beberapa detik (biar happy)
        let interval = setInterval(() => {
          if (!confettiAnimationActive || pieces.length < 40) {
            launchSoftConfetti();
          }
        }, 1800);
        setTimeout(() => clearInterval(interval), 15000);
      }
      return;
    }
    
    // Hitung sisa waktu ke ulang tahun berikutnya
    let remainingSeconds = Math.floor(diffMs / 1000);
    if (remainingSeconds < 0) remainingSeconds = 0;
    
    const days = Math.floor(remainingSeconds / 86400);
    const hours = Math.floor((remainingSeconds % 86400) / 3600);
    const minutes = Math.floor((remainingSeconds % 3600) / 60);
    const seconds = remainingSeconds % 60;
    
    // format angka selalu dua digit untuk jam/menit/detik
    const formattedHours = String(hours).padStart(2, '0');
    const formattedMinutes = String(minutes).padStart(2, '0');
    const formattedSeconds = String(seconds).padStart(2, '0');
    
    // custom message jika tinggal beberapa hari
    let preMessage = "";
    if (days === 0 && hours < 24 && hours > 0) preMessage = " Besok Hari yang Spesial Buatmu ia";
    else if (days === 1) preMessage = "🌙 H-1 menuju kebahagiaan! 🌙";
    else if (days <= 7 && days > 1) preMessage = `✨ ${days} hari lagi, surga kecilmu datang ✨`;
    else preMessage = `🌸 menuju usia 20 yang penuh mimpi 🌸`;
    
    countdownContainer.innerHTML = `
      <div class="countdown-nums">
        <div class="cd-box">
          <div class="cd-num">${days}</div>
          <div class="cd-label">days</div>
        </div>
        <div class="cd-box">
          <div class="cd-num">${formattedHours}</div>
          <div class="cd-label">hours</div>
        </div>
        <div class="cd-box">
          <div class="cd-num">${formattedMinutes}</div>
          <div class="cd-label">mins</div>
        </div>
        <div class="cd-box">
          <div class="cd-num">${formattedSeconds}</div>
          <div class="cd-label">secs</div>
        </div>
      </div>
    `;
    extraStatusSpan.innerHTML = `${preMessage}  🕯️  ${days === 0 ? "sebentar lagi" : "setiap detik mendekatkan kita"}`;
  }
  
  // Tambahan floating petals dekoratif di background (opsional, makin cantik)
  function createFloatingPetals() {
    const petalArray = ["🌸", "🌷", "🌼", "🍂", "✨", "💮", "🌺"];
    for (let i = 0; i < 28; i++) {
      const petal = document.createElement("div");
      petal.className = "floating-petal";
      petal.textContent = petalArray[Math.floor(Math.random() * petalArray.length)];
      petal.style.left = Math.random() * 100 + "vw";
      petal.style.fontSize = (0.8 + Math.random() * 1.2) + "rem";
      petal.style.animationDuration = 9 + Math.random() * 15 + "s";
      petal.style.animationDelay = Math.random() * 18 + "s";
      petal.style.opacity = 0.35 + Math.random() * 0.3;
      document.body.appendChild(petal);
    }
  }
  
  // fungsi untuk efek kejutan confetti saat countdown mendekati 0? tidak perlu berlebih, tapi bisa membuat semangat saat H-0
  // juga tambahkan trigger saat user membuka halaman jika belum lewat (tidak ada)
  
  // inisialisasi ukuran canvas
  resizeCanvas();
  window.addEventListener("resize", () => {
    resizeCanvas();
  });
  
  // jalankan countdown tiap detik
  updateCountdown();
  const timerInterval = setInterval(() => {
    updateCountdown();
  }, 1000);
  
  // membuat kelopak bunga yang lembut
  createFloatingPetals();
  
  // event: ketika halaman dimuat, jika hari ini bukan ultah, tidak usah konfeti berlebihan.
  // namun jika dalam 10 detik pertama kita cek lagi (biar pas detik tengah malam otomatis) sudah ditangani updateCountdown
  // juga tambahkan intersection observer opsional (tidak perlu) tapi konfeti untuk ulang tahun sudah di-handle.
  // untuk menambah sentuhan manis, ketika countdown mencapai hari H (0 days) otomatis refresh tampilan tiap detik, sudah beres.
  
  // Fallback kecil: saat momen ulang tahun, jika sebelumnya belum sempat muncul konfeti, periksa double check setiap 3 detik (jika ada perubahan jadi ultah)
  setInterval(() => {
    const now = new Date();
    const birthMonthChk = BIRTHDAY_DATE.getMonth();
    const birthDayChk = BIRTHDAY_DATE.getDate();
    if (now.getMonth() === birthMonthChk && now.getDate() === birthDayChk && !confettiLaunchedToday) {
      confettiLaunchedToday = true;
      launchSoftConfetti();
      let repeatInterval = setInterval(() => {
        if (!confettiAnimationActive || pieces.length < 35) launchSoftConfetti();
      }, 2000);
      setTimeout(() => clearInterval(repeatInterval), 13000);
    }
  }, 3000);
  
  // sentuhan tambahan: saat halaman interaksi pertama (klik) tidak perlu, namun confetti akan tetap meriah ketika H-0
  // juga pada countdown, jika hari ulang tahun tampilan sudah sempurna.
  // menambahkan hover effect pada cd-box sudah ada di CSS
  
  // optional: agar konfeti pada load tidak mengganggu, cek jika bukan ultah, tidak ada konfeti berlebih.
  // Jika ingin ada efek meriah saat halaman dibuka (optional) tapi tidak mengganggu: hanya untuk suasana ceria 
  // bisa beri sedikit konfetti ringan saat masuk halaman (sebagai selamat datang) — tapi kita beri sedikit agar manis
  window.addEventListener("load", () => {
    // sedikit semarak saat load tanpa membanjiri (jika bukan hari ultah, tetap ada efek kecil)
    if (!confettiLaunchedToday) {
      setTimeout(() => {
        // hanya jika tidak sedang dalam mode ultah, beri konfetti kecil meriah tapi tidak mengganggu
        const nowChk = new Date();
        if (!(nowChk.getMonth() === BIRTHDAY_DATE.getMonth() && nowChk.getDate() === BIRTHDAY_DATE.getDate())) {
          // memberikan sedikit confetti lembut untuk menyambut countdown, biar ada semangat
          if (ctx) {
            const tinyPieces = [];
            for (let i = 0; i < 25; i++) {
              tinyPieces.push({
                x: Math.random() * canvas.width,
                y: -20 - Math.random() * 150,
                w: 4 + Math.random() * 6,
                h: 2 + Math.random() * 5,
                color: ["#e8a0a0", "#f0d5a8", "#e3b28b"][Math.floor(Math.random() * 3)],
                vx: -0.8 + Math.random() * 1.8,
                vy: 1.5 + Math.random() * 3,
                angle: Math.random() * Math.PI * 2,
                spin: (0.01 + Math.random() * 0.05) * (Math.random() < 0.5 ? 1 : -1),
                life: 0.8,
              });
            }
            pieces = pieces.concat(tinyPieces);
            if (!confettiAnimationActive && pieces.length) {
              confettiAnimationActive = true;
              animateConfetti();
            }
            setTimeout(() => { if (pieces.length) pieces = pieces.filter(p => p.life > 0.1); }, 4000);
          }
        }
      }, 800);
    }
  });
  
  // bersihkan interval ketika halaman ditutup (opsional)
  window.addEventListener("beforeunload", () => {
    if (timerInterval) clearInterval(timerInterval);
  });
  
  // extra keindahan: tooltip kecil atau tidak perlu
  console.log("✨ Countdown cinta siap — ubah tanggal di variable BIRTHDAY_DATE ✨");
</script>
</body>
</html>
